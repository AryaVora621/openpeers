<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenPeers Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <div class="logo-icon"></div>
        <h1>OpenPeers</h1>
      </div>
      <div class="header-stats">
        <span id="active-peers-count" class="badge">0 Active</span>
        <span id="connection-status" class="badge disconnected">Disconnected</span>
      </div>
    </header>

    <main class="dashboard">
      <div class="sidebar">
        <h2>Active Peers</h2>
        <div id="peer-list" class="peer-list">
          <!-- Peers will be populated here -->
          <div class="empty-state">No peers connected.</div>
        </div>
      </div>

      <div class="terminal-grid-container">
        <div id="terminal-grid" class="terminal-grid">
          <!-- Terminals will be added here -->
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="script.js"></script>
</body>
</html>
